<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About - PDF Converter Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    color: #222;
}

.topbar {
    background: #1e5eff;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topbar .title {
    font-size: 18px;
    font-weight: bold;
}

.topbar .lang select {
    padding: 6px;
    border-radius: 6px;
    border: none;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    margin-top: 40px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h1 {
    margin-top: 0;
}

p {
    line-height: 1.6;
    color: #444;
}

a {
    color: #1e5eff;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="title" id="title">PDF Converter Pro</div>

    <div class="lang">
        <select onchange="changeLang(this.value)">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
        </select>
    </div>
</div>

<div class="container">

    <h1 id="h1">About Us</h1>

    <p id="text">
        PDF Converter Pro is a simple online tool that helps users convert PDF files into different formats.
        Our goal is to provide a fast, secure and easy experience for everyone around the world.
    </p>

    <a href="/">← Back to Home</a>

</div>

<script>
const translations = {
    en: {
        title: "PDF Converter Pro",
        h1: "About Us",
        text: "PDF Converter Pro is a simple online tool that helps users convert PDF files into different formats. Our goal is to provide a fast, secure and easy experience for everyone around the world."
    },
    es: {
        title: "Convertidor de PDF",
        h1: "Sobre Nosotros",
        text: "PDF Converter Pro es una herramienta online simple que ayuda a los usuarios a convertir archivos PDF a diferentes formatos. Nuestro objetivo es ofrecer una experiencia rápida, segura y fácil para todos."
    },
    fr: {
        title: "Convertisseur PDF",
        h1: "À propos de nous",
        text: "PDF Converter Pro est un outil en ligne simple qui aide les utilisateurs à convertir des fichiers PDF en différents formats. Notre objectif est de fournir une expérience rapide et sécurisée."
    }
};

function changeLang(lang) {
    localStorage.setItem("lang", lang);

    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("h1").innerText = translations[lang].h1;
    document.getElementById("text").innerText = translations[lang].text;
}

window.onload = function () {
    let lang = localStorage.getItem("lang") || "en";
    changeLang(lang);
};
</script>

</body>
</html>
