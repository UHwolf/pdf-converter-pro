<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privacy Policy - PDF Converter Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    color: #222;
}

.topbar {
    background: #1e5eff;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topbar .title {
    font-size: 18px;
    font-weight: bold;
}

.topbar .lang select {
    padding: 6px;
    border-radius: 6px;
    border: none;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    margin-top: 40px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h1 {
    margin-top: 0;
}

a {
    display: inline-block;
    margin-top: 20px;
    color: #1e5eff;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="title" id="title">PDF Converter Pro</div>

    <div class="lang">
        <select onchange="changeLang(this.value)">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
        </select>
    </div>
</div>

<div class="container">

    <h1 id="h1">Privacy Policy</h1>

    <p id="text">
        We respect your privacy. Files uploaded to our website are processed securely and automatically deleted.
        We do not store or share your files.
    </p>

    <a href="/">← Back to Home</a>

</div>

<script>
const translations = {
    en: {
        title: "PDF Converter Pro",
        h1: "Privacy Policy",
        text: "We respect your privacy. Files uploaded to our website are processed securely and automatically deleted. We do not store or share your files."
    },
    es: {
        title: "Convertidor de PDF",
        h1: "Política de Privacidad",
        text: "Respetamos tu privacidad. Los archivos se procesan de forma segura y se eliminan automáticamente. No almacenamos ni compartimos tus archivos."
    },
    fr: {
        title: "Convertisseur PDF",
        h1: "Politique de confidentialité",
        text: "Nous respectons votre vie privée. Les fichiers sont traités en toute sécurité et supprimés automatiquement. Nous ne stockons ni ne partageons vos fichiers."
    }
};

function changeLang(lang) {
    localStorage.setItem("lang", lang);

    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("h1").innerText = translations[lang].h1;
    document.getElementById("text").innerText = translations[lang].text;
}

window.onload = function () {
    let lang = localStorage.getItem("lang") || "en";
    changeLang(lang);
};
</script>

</body>
</html>
